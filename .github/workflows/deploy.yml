name: Deploy on Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to deployment directory
        run: |
          mkdir -p /home/michalx106/srv/RaspberryPiServer2
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            ./ /home/michalx106/srv/RaspberryPiServer2/

      - name: Rebuild and restart containers
        run: |
          cd /home/michalx106/srv
          docker compose up -d --build --remove-orphans

      - name: Show running containers
        run: |
          cd /home/michalx106/srv
          docker compose ps
