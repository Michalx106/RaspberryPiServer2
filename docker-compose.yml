services:
  backend:
    build:
      context: ./server
    container_name: roompi-backend
    environment:
      - PORT=${PORT:-3000}
      - MQTT_ENABLED=${MQTT_ENABLED:-true}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-localhost}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_SENSOR_TOPIC_PREFIX=${MQTT_SENSOR_TOPIC_PREFIX:-roompi/sensors}
      - MQTT_DEVICE_TOPIC_PREFIX=${MQTT_DEVICE_TOPIC_PREFIX:-roompi/devices}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    ports:
      - "3000:3000"
    volumes:
      - ./server/devices.json:/app/devices.json
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    container_name: roompi-frontend
    depends_on:
      - backend
    environment:
      - API_HOST=${API_HOST:-backend}
      - API_PORT=${API_PORT:-3000}
    ports:
      - "80:80"
    restart: unless-stopped
