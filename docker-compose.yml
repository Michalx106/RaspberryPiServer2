services:
  backend:
    build:
      context: ./server
    container_name: roompi-backend
    environment:
      - PORT=3000
      - MQTT_ENABLED=${MQTT_ENABLED:-true}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-192.168.0.151}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_SENSOR_TOPIC_PREFIX=${MQTT_SENSOR_TOPIC_PREFIX:-roompi/sensors}
      - MQTT_DEVICE_TOPIC_PREFIX=${MQTT_DEVICE_TOPIC_PREFIX:-roompi/devices}
      - MQTT_USERNAME=${MQTT_USERNAME:-hauser}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-Kowies1234}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-michalx106}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Kowies1234}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-Kowies1234}
      - ADMIN_JWT_ALGORITHM=${ADMIN_JWT_ALGORITHM:-HS256}
      - ADMIN_JWT_EXPIRES_MINUTES=${ADMIN_JWT_EXPIRES_MINUTES:-120}
    ports:
      - "3000:3000"
    volumes:
      - ./server/devices.json:/app/devices.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    container_name: roompi-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_HOST=${API_HOST:-backend}
      - API_PORT=${API_PORT:-3000}
    ports:
      - "80:80"
    restart: unless-stopped
